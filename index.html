<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intern Listings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <h1>Intern Listings</h1>

  <div class="main-container">

    <!-- Left: Form -->
    <div class="form-panel">
      <form id="internForm">
        <label for="name">Name</label>
        <input type="text" id="name" required placeholder="Juan Dela Cruz">

        <label for="university">University</label>
        <input type="text" id="university" required placeholder="Batangas State University">

        <label for="role">Role</label>
        <input type="text" id="role" equired placeholder="Software Development Intern">

        <label for="department">Department</label>
        <input type="text" id="department" required placeholder="Information Technology">

        <input type="hidden" id="ID">

        <div class="button-group">
          <button type="button" id="add">Add Intern</button>
          <button type="button" id="update">Update Intern</button>
        </div>
      </form>
    </div>

    <!-- Right: Table -->
    <div class="table-panel">
      <table id="userTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>University</th>
            <th>Role</th>
            <th>Department</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="content"></tbody>
      </table>
    </div>

  </div>

  <script src="index.js"></script>

</body>
</html>
